<!DOCTYPE html> 
<html lang="en"> 
    <head> 
        <title>Two column rollover Gallery</title> 
        <meta charset="utf-8"> 
        <meta details go here 
        <link rel="stylesheet" type="text/css" href="gallery-2col.css"> 
        <style>
            <!-- Listing 2-3b. The CSS Style Sheet for Listing 2-3a (gallery-2col.css) -->

/*reset browsers to give cross browser uniformity*/ 
html, body, p, lu, li {margin:0; padding:0; 
} 
/*set images to have no borders*/ 
img { border:0; 
} 
/*place the column on the page*/ 
#col-1 { position: absolute; top: 0; left: 0; width:85px; 
} 
/* Set general thumbnail styles and remove bullets from the list elements*/ 
li { margin: 5px; list-style-type:none; 
} 
/* MouseOut state (default) - create and position a space for the larger images -

and hide them*/ 
#col-1 a img.hid { width: 260px; height:390px; -

position: absolute; top: 10px; left: 250px; visibility: hidden; 
} 
/* MouseOver state (hover)- reveal larger picture */ 
#col-1 a:hover { background: white; 
}
#col-1 a:hover img.hid { visibility:visible; 
} 
/*--THE 2ND COLUMN STARTS 85 PIXELS FURTHER TO THE RIGHT ---*/ 
#col-2 { position: absolute; top: 0; left: 85px; width:85px; 
} 
li { margin: 5px; list-style-type:none; 
} 
/* MouseOut state (default) - hide larger picture */ 
#col-2 a img.hid { width: 260px; height:390px; position: absolute; top: 10px; left: 155px; margin-left:10px; visibility: hidden; 
} 
/* MouseOver state (hover)- reveal larger picture */ 
#col-2 a:hover { background: white; 
} 
#col-2 a:hover img.hid { visibility:visible; 
}
        </style>
    </head> 
    <body> 
        <ul id="col-1"> 
            <li><a href="#"><img src=“images/alithumb.jpg" alt="Ali" title="Ali"><img class="hid" src=“images/alibig.jpg" alt=" "></a></li> 

            <li><a href="#"><img src="images/catthumb.jpg" alt="Cat" title="Cat"/><img class="hid" src="images/catbig.jpg" alt=" "></a></li> 

            <li><a href="#"><img src="images/beachthumb.jpg" alt="Beach scene" title="Beach scene"><img class="hid" src="images/beachbig.jpg" alt=" "></a></li> 
        </ul> 

        <ul id="col-2"> 
            <li><a href="#"><img src="images/fernsthumb.jpg" alt="Ferns" title="Ferns"><img class="hid" src="images/fernsbig.jpg" alt=" "></a></li> 

            <li><a href="#"><img src="images/nicohumb.jpg" alt="Nico" title="Ferns"/><img class="hid" src="images/nicobig.jpg" alt=" "></a></li>

            <li><a href="#"><img src="images/cliffthumb.jpg" alt="Cliff" title="Cliff"><img class="hid" src="images/cliffbig.jpg" alt=" "></a></li> 
        </ul> 
    </body> 
</html>
